name: Application Code Build 

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  demo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate with Infisical via OIDC and fetch secrets
        uses: Infisical/secrets-action@v1.0.9
        with:
          method: oidc
          identity-id: "6f09c2d7-daee-4a01-8d1a-0aa070f7c85a"
          domain: "https://app.infisical.com"
          project-slug: "resume-analyzer-w2c-w"
          env-slug: "dev"

      - name: Log in to Docker Hub
        run: |
          echo "$DOCKER_PASSWORD" | docker login \
            -u "$DOCKER_USERNAME" \
            --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Backend Image
      - name: Build and Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            "$DOCKER_USERNAME"/backend:latest
            "$DOCKER_USERNAME"/backend:${{ github.sha }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            "$DOCKER_USERNAME"/frontend:latest
            "$DOCKER_USERNAME"/frontend:${{ github.sha }}
