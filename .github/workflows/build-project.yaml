name: Application Code Build 

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  demo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate with Infisical via OIDC and fetch secrets
        uses: Infisical/secrets-action@v1.0.9
        with:
          method: oidc
          identity-id: "6f09c2d7-daee-4a01-8d1a-0aa070f7c85a"
          domain: "https://app.infisical.com"
          project-slug: "resume-analyzer-w2c-w"
          env-slug: "dev"

      - name: Log in to Docker Hub
        run: |
          echo "$DOCKER_PASSWORD" | docker login \
            -u "$DOCKER_USERNAME" \
            --password-stdin
            
      - name: Export Variables
        run: |
          echo "DOCKER_USERNAME=${DOCKER_USERNAME}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Backend Image
      - name: Build and Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./Backend
          file: ./Backend/Dockerfile
          push: true
          tags: |
             ${{ env.DOCKER_USERNAME }}/backend:latest
             ${{ env.DOCKER_USERNAME }}/backend:${{ github.sha }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./Frontend
          file: ./Frontend/Dockerfile
          push: true
          tags: |
             ${{ env.DOCKER_USERNAME }}/frontend:latest
             ${{ env.DOCKER_USERNAME }}/frontend:${{ github.sha }}
